name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

jobs:
  release:
    name: ${{ matrix.name }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            assetPrefix: macos
            args: "--target aarch64-apple-darwin --bundles app,dmg"
            tauriScript: ""
          - name: Ubuntu deb
            platform: ubuntu-22.04
            assetPrefix: ubuntu
            args: "--bundles deb"
            tauriScript: ""
          - name: Arch CachyOS AppImage
            platform: ubuntu-22.04
            assetPrefix: arch
            args: "--bundles appimage"
            tauriScript: "./scripts/tauri-appimage-build.sh"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils libfuse2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Rust
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust macOS targets
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure macOS signing
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
            echo "APPLE_CERTIFICATE is not configured; using ad-hoc macOS signing."
            exit 0
          fi

          for variable in APPLE_CERTIFICATE_PASSWORD KEYCHAIN_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!variable:-}" ]; then
              echo "$variable is required when APPLE_CERTIFICATE is configured." >&2
              exit 1
            fi
          done

          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

          certificate_info="$(security find-identity -v -p codesigning build.keychain | grep 'Developer ID Application' | head -n 1 || true)"
          if [ -z "$certificate_info" ]; then
            echo "No Developer ID Application identity found in APPLE_CERTIFICATE." >&2
            exit 1
          fi

          certificate_name="$(printf '%s\n' "$certificate_info" | awk -F'"' '{print $2}')"
          echo "APPLE_SIGNING_IDENTITY=$certificate_name" >> "$GITHUB_ENV"
          echo "Configured Developer ID signing identity."

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Downloader v__VERSION__"
          releaseBody: "Download the installer for your platform. The app updater uses latest.json from this release."
          releaseDraft: false
          prerelease: false
          releaseAssetNamePattern: "${{ matrix.assetPrefix }}_[bundle]_[arch]_[name]_[version][ext]"
          tauriScript: ${{ matrix.tauriScript }}
          args: ${{ matrix.args }}
